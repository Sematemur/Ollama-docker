apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: chat-system
  labels:
    app: debug
    app.kubernetes.io/part-of: chat-system
spec:
  containers:
    - name: debug
      image: nicolaka/netshoot:latest
      command:
        - sleep
        - "infinity"
      env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-secrets
              key: REDIS_PASSWORD
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
  restartPolicy: Never
  terminationGracePeriodSeconds: 0
---
# Usage examples:
#
# Enter the debug pod:
#   kubectl exec -it debug-pod -n chat-system -- bash
#
# Test DNS resolution:
#   nslookup postgres-service.chat-system.svc.cluster.local
#   nslookup api-service.chat-system.svc.cluster.local
#   nslookup agent-service.chat-system.svc.cluster.local
#
# Test API service:
#   curl http://api-service:8000/health
#   curl http://agent-service:8001/health
#
# Test PostgreSQL:
#   psql postgresql://chatuser:$POSTGRES_PASSWORD@postgres-service:5432/chatdb -c '\dt'
#
# Test Redis:
#   redis-cli -h redis-service -a $REDIS_PASSWORD ping
#
# Test LiteLLM:
#   curl http://litellm-service:4000/health/liveliness
#
# Test Prometheus:
#   curl http://prometheus-service:9090/-/healthy
#
# Network debugging:
#   tcpdump -i any port 8000
#   iperf3 -c api-service
