apiVersion: v1
kind: Service
metadata:
  name: tempo-service
  namespace: chat-system
  labels:
    app: tempo
    app.kubernetes.io/part-of: chat-system
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
    - port: 3200
      targetPort: 3200
      protocol: TCP
      name: http
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
