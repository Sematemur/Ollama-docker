apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: chat-system
  labels:
    app: prometheus
    app.kubernetes.io/part-of: chat-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "chat-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["api-service:8000"]
