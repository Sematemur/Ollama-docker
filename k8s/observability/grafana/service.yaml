apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: chat-system
  labels:
    app: grafana
    app.kubernetes.io/part-of: chat-system
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
      name: http
