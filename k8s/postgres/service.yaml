apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: chat-system
  labels:
    app: postgres
    app.kubernetes.io/part-of: chat-system
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
