apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: chat-system
  labels:
    app: api
    app.kubernetes.io/part-of: chat-system
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
      name: http
