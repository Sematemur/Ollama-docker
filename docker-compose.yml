# ============================================
# DOCKER COMPOSE
# ============================================
# TĂĽm servisleri tek komutla ayaÄźa kaldÄ±rÄ±r:
#   docker compose up --build
#
# Servisleri durdurmak iĂ§in:
#   docker compose down

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      # VeritabanÄ± verilerini persist et
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    env_file:
      - .env
    command: ["sh", "-c", "redis-server --save 60 1 --appendonly yes --loglevel warning --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # LITELLM PROXY
  # ============================================
  # Ollama ve diÄźer LLM'lere unified gateway
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: chat-litellm
    ports:
      - "8023:4000"             # localhost:8023 -> container:4000
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    env_file:
      - .env
    environment:
      - UI_USERNAME=${LITELLM_UI_USERNAME}
      - UI_PASSWORD=${LITELLM_UI_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Ollama'ya eriĹźim iĂ§in
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================
  # BACKEND (FastAPI)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "8000:8000"           # localhost:8000 -> container:8000
    env_file:
      - .env
    environment:
      # LiteLLM docker network ĂĽzerinden eriĹźim
      - LITELLM_BASE_URL=http://litellm:4000/
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME}
      # Redis response cache
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_CACHE_TTL_SECONDS=${REDIS_CACHE_TTL_SECONDS}
      - ENABLE_RESPONSE_CACHE=${ENABLE_RESPONSE_CACHE}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS}
      - CACHE_SENSITIVE_PATTERNS=${CACHE_SENSITIVE_PATTERNS}
      # PostgreSQL baÄźlantÄ± bilgileri
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # LangSmith Tracing
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      # MCP tools
      - MCP_ENABLED_TOOLS=${MCP_ENABLED_TOOLS}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_TOOL_TIMEOUT_MS=${MCP_TOOL_TIMEOUT_MS}
      - MCP_TOOL_MAX_RETRIES=${MCP_TOOL_MAX_RETRIES}
      - MCP_TOOL_INITIAL_BACKOFF_MS=${MCP_TOOL_INITIAL_BACKOFF_MS}
      # OpenTelemetry
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_PUSH_URL=${LOKI_PUSH_URL}
      # Agent service baÄźlantÄ±sÄ±
      - AGENT_SERVICE_URL=http://agent-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy  # LiteLLM hazÄ±r olana kadar bekle
      redis:
        condition: service_healthy
      agent-service:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # AGENT SERVICE (LangGraph Orchestration)
  # ============================================
  agent-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent
    container_name: chat-agent-service
    env_file:
      - .env
    environment:
      # LiteLLM docker network ĂĽzerinden eriĹźim
      - LITELLM_BASE_URL=http://litellm:4000/
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_MODEL_NAME=${LITELLM_MODEL_NAME}
      # Redis response cache
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_CACHE_TTL_SECONDS=${REDIS_CACHE_TTL_SECONDS}
      - ENABLE_RESPONSE_CACHE=${ENABLE_RESPONSE_CACHE}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS}
      - CACHE_SENSITIVE_PATTERNS=${CACHE_SENSITIVE_PATTERNS}
      # LangSmith Tracing
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      # MCP tools
      - MCP_ENABLED_TOOLS=${MCP_ENABLED_TOOLS}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_TOOL_TIMEOUT_MS=${MCP_TOOL_TIMEOUT_MS}
      - MCP_TOOL_MAX_RETRIES=${MCP_TOOL_MAX_RETRIES}
      - MCP_TOOL_INITIAL_BACKOFF_MS=${MCP_TOOL_INITIAL_BACKOFF_MS}
      # OpenTelemetry
      - OTEL_SERVICE_NAME=chat-agent
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - LOKI_PUSH_URL=${LOKI_PUSH_URL}
    depends_on:
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # FRONTEND (React + Vite)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-frontend
    ports:
      - "5173:5173"           # localhost:5173 -> container:5173
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend              # Backend baĹźlamadan frontend baĹźlamaz
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # PROMETHEUS (Metrics)
  # ============================================
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: chat-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # LOKI (Logs)
  # ============================================
  loki:
    image: grafana/loki:3.0.0
    container_name: chat-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # TEMPO (Tracing)
  # ============================================
  tempo:
    image: grafana/tempo:2.5.0
    container_name: chat-tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
    networks:
      - chat-network
    restart: unless-stopped

  # ============================================
  # GRAFANA (Dashboards)
  # ============================================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: chat-grafana
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION=true
    depends_on:
      - prometheus
      - loki
      - tempo
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - chat-network
    restart: unless-stopped

# ============================================
# VOLUMES
# ============================================
# PostgreSQL verilerini kalÄ±cÄ± olarak saklar
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

# ============================================
# NETWORK
# ============================================
# TĂĽm servislerin birbiriyle iletiĹźim kurmasÄ± iĂ§in
networks:
  chat-network:
    driver: bridge
